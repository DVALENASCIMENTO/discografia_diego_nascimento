<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Senhor e Salvador</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/style.css">

<!-- IMPORTANTE: defer garante que o HTML carregue antes do JS -->
<script src="../js/script.js" defer></script>

</head>

<body>

<h1 id="titulo-album"></h1>

<img src="../img/cd1.png" class="capa-grande">

<p id="descricao-album"></p>

<h2 id="musica-atual"></h2>

<p id="descricao-musica"></p>

<audio id="player"></audio>

<div class="controles">

<button onclick="anterior()">⏮ Anterior</button>

<button onclick="playPause()">⏯ Play/Pause</button>

<button onclick="proxima()">⏭ Próxima</button>

</div>

<h2>Faixas do álbum</h2>

<ol id="lista-musicas">

<li onclick="irPara(0)">Abertura</li>
<li onclick="irPara(1)">Deus Forte</li>
<li onclick="irPara(2)">Holy Spirit</li>
<li onclick="irPara(3)">Hosana</li>
<li onclick="irPara(4)">Meu Amigo, Meu Protetor</li>
<li onclick="irPara(5)">Jesus</li>
<li onclick="irPara(6)">Redentor</li>
<li onclick="irPara(7)">Em Tua Presença</li>
<li onclick="irPara(8)">Senhor e Salvador</li>
<li onclick="irPara(9)">Emanuel</li>

</ol>

<button onclick="window.location.href='../index.html'">Voltar</button>


<!-- INICIALIZAÇÃO SEGURA -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    if (typeof carregarAlbum === "function") {
        carregarAlbum("../data/cd1.json")
    } else {
        console.error("player.js não carregou")
        alert("Erro ao carregar o player.js (verifique o caminho)")
    }
})
</script>

</body>
</html>
