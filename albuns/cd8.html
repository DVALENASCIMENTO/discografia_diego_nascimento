<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>"YESHUA"</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/style.css">

<!-- IMPORTANTE: defer garante que o HTML carregue antes do JS -->
<script src="../js/script.js" defer></script>

</head>

<body>

<h1 id="titulo-album"></h1>

<img src="../img/cd8.png" class="capa-grande">

<p id="descricao-album"></p>

<h2 id="musica-atual"></h2>

<p id="descricao-musica"></p>

<!-- controls ajuda no debug -->
<audio id="player" controls></audio>

<div class="controles">
<button onclick="anterior()">⏮ Anterior</button>
<button onclick="playPause()">⏯ Play/Pause</button>
<button onclick="proxima()">⏭ Próxima</button>
</div>

<h2>Faixas do álbum</h2>

<ol id="lista-musicas">
<li onclick="irPara(0)">Aquietai-vos</li>
<li onclick="irPara(1)">Meu Abrigo</li>
<li onclick="irPara(2)">Com Sol ou Chuva</li>
<li onclick="irPara(3)">Canção do Verdadeiro Amor</li>
<li onclick="irPara(4)">Deus Prova o Seu Amor</li>
<li onclick="irPara(5)">Sangue Inocente</li>
<li onclick="irPara(6)">Cristo Vive em Mim</li>
<li onclick="irPara(7)">O Grande Amor de Deus</li>
<li onclick="irPara(8)">Terceiro Céu</li>
<li onclick="irPara(9)">Teu Olhar</li>
</ol>

<button onclick="window.location.href='../index.html'">Voltar</button>

<!-- INICIALIZAÇÃO SEGURA -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    if (typeof carregarAlbum === "function") {
        carregarAlbum("../data/cd8.json")
    } else {
        console.error("player.js não carregou")
        alert("Erro ao carregar o player.js (verifique o caminho)")
    }
})
</script>

</body>
</html>
